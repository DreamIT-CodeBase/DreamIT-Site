name: Hourly Azure Static Web Apps Deploy

on:
  schedule:
    # GitHub Actions cron uses UTC.
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-azure-static-web-apps-deploy
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and deploy site
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_ROCK_099BF9510 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: out
          app_build_command: "npm run build && test -f out/glossary/sql-server-reporting-services.html"
        env:
          CI: true
