name: Build And Deploy for Preview

on:
    schedule:
      - cron: "1 */1 * * *"

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.9]

        steps:
            - name: FAB Builder PagePilot Check API Response
              id: check_api
              run: |
                RESPONSE=$(curl -s https://pagepilot.fabbuilder.com/api/tenant/67beb76503c96859162a68f7/check-data-changed)
                echo "FAB Builder PagePilot API Response: $RESPONSE"
                if [ "$RESPONSE" != "true" ]; then
                  echo "API returned false, exiting job."
                  exit 0
                fi
            - uses: actions/checkout@v1
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v1
              with:
                  node-version: ${{ matrix.node-version }}
            - name: npm install and test on client
              run: |
                  npm install  --ignore-peer --force --legacy-peer-deps 
                  npm run export
              env:
                  CI: true
            - name: Deployment
              uses: w9jds/firebase-action@v12.8.0
              with:
                  args: deploy  --project ${{ secrets.FIREBASE_PROJECT }} --only hosting:${{ secrets.FIREBASE_HOSTING }}
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
            - name: Acknowledge Check API
              id: pagepilot_fabbuilder_acknowledge_changes_api
              run: |
                RESPONSE=$(curl -s https://pagepilot.fabbuilder.com/api/tenant/67beb76503c96859162a68f7/acknowledged-data-changed)
                echo "API Response: $RESPONSE"
                if [ "$RESPONSE" != "DONE" ]; then
                  echo "API returned, exiting job."
                  exit 1
                fi
