name: Scheduled Azure Static Web Apps Deploy

on:
  schedule:
    - cron: "1 */1 * * *"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: FAB Builder PagePilot Check API Response
        id: check_api
        run: |
          RESPONSE=$(curl -s https://pagepilot.fabbuilder.com/api/tenant/67beb76503c96859162a68f7/check-data-changed)
          echo "FAB Builder PagePilot API Response: $RESPONSE"
          if [ "$RESPONSE" != "true" ]; then
            echo "API returned false, exiting job."
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Build and deploy site
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dreamIt-website
          api_location: ""
          output_location: out
          app_build_command: "npm run build && test -f out/glossary/sql-server-reporting-services.html"
        env:
          CI: true
      - name: Acknowledge Check API
        id: pagepilot_fabbuilder_acknowledge_changes_api
        run: |
          RESPONSE=$(curl -s https://pagepilot.fabbuilder.com/api/tenant/67beb76503c96859162a68f7/acknowledged-data-changed)
          echo "API Response: $RESPONSE"
          if [ "$RESPONSE" != "DONE" ]; then
            echo "API returned, exiting job."
            exit 1
          fi
