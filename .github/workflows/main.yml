name: Build And Deploy for Preview

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20.9]

        steps:
            - uses: actions/checkout@v1
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v1
              with:
                  node-version: ${{ matrix.node-version }}
            - name: npm install and test on client
              run: |
                  npm install  --ignore-peer --force --legacy-peer-deps 
                  npm run export
              env:
                  CI: true
            - name: Verify glossary export path
              run: |
                  if [ -f out/glossary/sql-server-reporting-services.html ] || [ -f out/glossary/sql-server-reporting-services/index.html ]; then
                    echo "Glossary export verified."
                  else
                    echo "Missing exported glossary page: sql-server-reporting-services"
                    exit 1
                  fi
            - name: Deployment
              uses: w9jds/firebase-action@v12.8.0
              with:
                  args: deploy  --project ${{ secrets.FIREBASE_PROJECT }} --only hosting:${{ secrets.FIREBASE_HOSTING }}
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
